{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="container">

    <div class="row justify-content-center min-vh-75 align-items-center">

        <div class="col-md-6 col-lg-5">

            <div class="card shadow-lg border-0">

                <div class="card-body p-4">

                    <h2 class="text-center mb-4">
                        Login
                    </h2>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Login Type
                            </label>

                            <select
                                name="login_type"
                                class="form-select"
                                required>

                                <option value="user">
                                    User Login
                                </option>

                                <option value="admin">
                                    Admin Login
                                </option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                    <hr>

                    <div class="text-center">

                        Don't have an account?

                        <a href="{% url 'register' %}">
                            Register
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
